name: Project Issue
description: Report an app-specific bug for a single project
title: "[Project] "
labels:
  - status:triage
body:
  - type: dropdown
    id: project_folder
    attributes:
      label: Project/Folder
      options:
        - jesus-family-tree
        - cielovista-website-generator
        - wb-core
        - wb-theme-extension
        - vscode-claude
        - VSCodePlugins
        - other
    validations:
      required: true

  - type: input
    id: folder_path
    attributes:
      label: Folder Path
      placeholder: C:/dev/jesus-family-tree
    validations:
      required: true

  - type: dropdown
    id: scope_type
    attributes:
      label: Scope Type
      options:
        - Tooling issue (belongs in central tools repo)
        - Project issue (belongs in app repo)
        - Cross-project issue
      default: 1
    validations:
      required: true

  - type: input
    id: feature_area
    attributes:
      label: Feature or Module
      placeholder: Home page, auth, data import, API client
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: Reproduction Steps
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Node 22, Chrome 135
    validations:
      required: false
