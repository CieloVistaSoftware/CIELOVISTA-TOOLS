<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none';style-src 'unsafe-inline';script-src 'unsafe-inline';">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--vscode-font-family);font-size:13px;color:var(--vscode-editor-foreground);background:var(--vscode-editor-background)}

#toolbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;
  background:var(--vscode-sideBar-background);
  border-bottom:1px solid var(--vscode-panel-border)
}
#filter{
  flex:1;padding:5px 10px;
  border:1px solid var(--vscode-panel-border);border-radius:4px;
  background:var(--vscode-input-background);color:var(--vscode-input-foreground);
  font-family:inherit;font-size:12px;outline:none
}
#filter:focus{border-color:var(--vscode-focusBorder)}
#filter::placeholder{color:var(--vscode-input-placeholderForeground)}
#btn-refresh{
  background:var(--vscode-button-secondaryBackground);
  color:var(--vscode-button-secondaryForeground);
  border:none;padding:5px 12px;border-radius:4px;
  cursor:pointer;font-size:12px;white-space:nowrap
}
#btn-refresh:hover{background:var(--vscode-button-secondaryHoverBackground)}

#content{padding:4px 0}

.pkg-group{margin-bottom:1px}

.pkg-header{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;cursor:pointer;user-select:none;
  font-size:11px;font-weight:700;
  color:var(--vscode-descriptionForeground);
  letter-spacing:.03em;
  background:var(--vscode-sideBar-background);
  border-bottom:1px solid var(--vscode-panel-border)
}
.pkg-header:hover{background:var(--vscode-list-hoverBackground);color:var(--vscode-editor-foreground)}
.pkg-arrow{font-size:9px;transition:transform .12s;display:inline-block;width:10px;flex-shrink:0}
.pkg-arrow.open{transform:rotate(90deg)}
.pkg-name{font-weight:700;white-space:nowrap}
.pkg-rel{
  font-family:var(--vscode-editor-font-family,monospace);
  font-size:10px;opacity:.6;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  flex:1;min-width:0
}
.pkg-count{font-size:10px;font-weight:400;opacity:.65;margin-left:4px;white-space:nowrap}

.script-list{display:none}
.script-list.open{display:block}

.script-row{
  display:grid;
  grid-template-columns:minmax(130px,1.2fr) minmax(0,2fr) auto auto;
  align-items:center;gap:8px;
  padding:4px 14px 4px 32px;
  border-bottom:1px solid transparent
}
.script-row:hover{background:var(--vscode-list-hoverBackground)}
.script-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.script-cmd{
  font-family:var(--vscode-editor-font-family,monospace);
  font-size:10px;color:var(--vscode-descriptionForeground);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.btn-run{
  background:var(--vscode-button-background);
  color:var(--vscode-button-foreground);
  border:none;border-radius:3px;padding:2px 10px;
  cursor:pointer;font-size:11px;font-weight:600;
  white-space:nowrap;flex-shrink:0;
  transition:background .15s,color .15s,box-shadow .15s
}
.btn-run:hover{background:var(--vscode-button-hoverBackground)}
/* running=green glow (terminal opened), ok=green solid (exit 0), error=red (exit!=0) */
.btn-run.running{background:#1a7f37!important;color:#fff!important;box-shadow:0 0 5px #3fb950}
.btn-run.ok     {background:#1a7f37!important;color:#fff!important}
.btn-run.ok:hover{background:#238a42}
.btn-run.error  {background:#b91c1c!important;color:#fff!important;box-shadow:0 0 5px #f85149}
.btn-run.error:hover{background:#c72323}
.btn-issue{
  background:var(--vscode-button-secondaryBackground);
  color:var(--vscode-button-secondaryForeground);
  border:none;border-radius:3px;padding:2px 8px;
  cursor:pointer;font-size:11px;font-weight:600;
  white-space:nowrap;flex-shrink:0;
}
.btn-issue:hover{background:var(--vscode-button-secondaryHoverBackground)}

#empty{padding:24px 20px;font-size:12px;color:var(--vscode-descriptionForeground);display:none}
#loading{padding:24px 20px;font-size:12px;color:var(--vscode-descriptionForeground)}
</style>
</head>
<body>

<div id="toolbar">
  <input id="filter" type="text" placeholder="Filter scripts by name or command…" autocomplete="off" spellcheck="false">
  <button id="btn-refresh">↻ Refresh</button>
</div>

<div id="loading">Loading scripts…</div>
<div id="empty">No package.json files with scripts found in this workspace.</div>
<div id="content"></div>

<script>
(function(){
var vsc = acquireVsCodeApi();
var content  = document.getElementById('content');
var loading  = document.getElementById('loading');
var empty    = document.getElementById('empty');
var filter   = document.getElementById('filter');

// ── Render ────────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var SCRIPT_DESCRIPTIONS = {
  'compile':              'Bundles TypeScript source via esbuild into out/',
  'typecheck':            'Type-checks TypeScript without emitting files',
  'watch':                'Starts TypeScript compiler in watch mode — recompiles on every save',
  'build':                'Alias for compile',
  'package':              'Packages the extension into a .vsix file via vsce',
  'rebuild':              'Full clean + compile + package + install cycle — ⚠ Slow (30–60 sec)',
  'clean:project':        'Shows what clean:project:apply would delete — dry run, no changes',
  'clean:project:apply':  '⚠ Deletes all generated/temp files — irreversible without git',
  'docs:generate':        'Auto-generates feature README stubs from src/features/',
  'copy:commandhelp':     'Copies CommandHelp .md files into out/ for packaging',
  'validate:package-json': 'Validates package.json structure and required fields',
  'test:catalog':         'Runs catalog integrity tests',
  'test:catalog:no-mutate': 'Runs catalog tests in read-only mode (no file writes)',
  'test:commands':        'Validates all documented commands exist and are registered',
  'test:preflight':       'Runs preflight regression checks before committing',
  'test:regression':      'Runs all regression tests (REG-*.test.js) — aborts if any fail',
  'test:activation':      'Runs VS Code extension activation tests',
};

function runBtnTitle(name, cmd) {
  var desc = SCRIPT_DESCRIPTIONS[name];
  var lines = [];
  if (desc) { lines.push(desc); }
  lines.push('Command: ' + cmd);
  return lines.join('\n');
}

function render(entries){
  loading.style.display = 'none';
  content.innerHTML = '';

  if(!entries || !entries.length){
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  entries.forEach(function(e, gi){
    var grp = document.createElement('div');
    grp.className = 'pkg-group';
    grp.dataset.group = gi;

    var hd = document.createElement('div');
    hd.className = 'pkg-header';
    hd.innerHTML =
      '<span class="pkg-arrow open">&#9654;</span>' +
      '<span class="pkg-name">' + esc(e.label) + '</span>' +
      '<span class="pkg-count">(' + e.scripts.length + ')</span>' +
      '<span class="pkg-rel" title="' + esc(e.relPath) + '">' + esc(e.relPath) + '</span>';

    var list = document.createElement('div');
    list.className = 'script-list open';

    e.scripts.forEach(function(s, si){
      var row = document.createElement('div');
      row.className = 'script-row';
      row.dataset.name = s.name.toLowerCase();
      row.dataset.cmd  = s.cmd.toLowerCase();
      var key = e.absDir + '|||' + s.name;
      row.innerHTML =
        '<span class="script-name">' + esc(s.name) + '</span>' +
        '<span class="script-cmd" title="' + esc(s.cmd) + '">' + esc(s.cmd) + '</span>' +
        '<button class="btn-run" data-dir="' + esc(e.absDir) + '" data-script="' + esc(s.name) + '" data-key="' + esc(key) + '" title="' + esc(runBtnTitle(s.name, s.cmd)) + '">&#9654; Run</button>';
      list.appendChild(row);
    });

    // collapse toggle
    hd.addEventListener('click', function(){
      var open = list.classList.toggle('open');
      hd.querySelector('.pkg-arrow').classList.toggle('open', open);
    });

    // run buttons
    list.querySelectorAll('.btn-run').forEach(function(btn){
      btn.addEventListener('click', function(ev){
        ev.stopPropagation();
        vsc.postMessage({ type:'run', dir:btn.dataset.dir, script:btn.dataset.script });
        setBtn(btn, 'running');
      });
    });

    grp.appendChild(hd);
    grp.appendChild(list);
    content.appendChild(grp);
  });
}

// ── Filter ────────────────────────────────────────────────────────────────────
filter.addEventListener('input', function(){
  var q = filter.value.toLowerCase().trim();
  document.querySelectorAll('.pkg-group').forEach(function(grp){
    var any = false;
    grp.querySelectorAll('.script-row').forEach(function(row){
      var show = !q || row.dataset.name.includes(q) || row.dataset.cmd.includes(q);
      row.style.display = show ? '' : 'none';
      if(show){ any = true; }
    });
    grp.style.display = (any || !q) ? '' : 'none';
    if(q && any){
      grp.querySelector('.script-list').classList.add('open');
      grp.querySelector('.pkg-arrow').classList.add('open');
    }
  });
});

// ── Refresh ───────────────────────────────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', function(){
  loading.style.display = 'block';
  content.innerHTML = '';
  empty.style.display = 'none';
  filter.value = '';
  vsc.postMessage({ type:'refresh' });
});

// ── Button state helper ───────────────────────────────────────────────────────
function setBtn(btn, state){
  // Remove any issue button from a previous error state
  var prev = btn.nextElementSibling;
  if(prev && prev.classList.contains('btn-issue')){ prev.remove(); }

  btn.classList.remove('running','ok','error');
  if(state === 'running'){
    btn.classList.add('running');
    btn.innerHTML = '&#9654; Run'; // stays as ▶ Run but turns green immediately (#512)
  } else if(state === 'ok'){
    btn.classList.add('ok');
    btn.innerHTML = '&#10003; Run';
    // Auto-reset to default blue after 2s so button doesn't stay green permanently
    setTimeout(function(){
      btn.classList.remove('ok');
      btn.innerHTML = '&#9654; Run';
    }, 2000);
  } else if(state === 'error'){
    btn.classList.add('error');
    btn.innerHTML = '&#8635; Retry';
    var ib = document.createElement('button');
    ib.className = 'btn-issue';
    ib.textContent = '📋 Issue';
    ib.dataset.dir    = btn.dataset.dir;
    ib.dataset.script = btn.dataset.script;
    ib.addEventListener('click', function(ev){
      ev.stopPropagation();
      vsc.postMessage({ type:'create-issue', dir:btn.dataset.dir, script:btn.dataset.script });
    });
    btn.parentNode.insertBefore(ib, btn.nextSibling);
  }
}

// ── Messages from host ────────────────────────────────────────────────────────
window.addEventListener('message', function(e){
  var msg = e.data;
  if(!msg){ return; }
  if(msg.type === 'init'){ render(msg.entries); return; }
  if(msg.type === 'run-state'){
    var key = msg.dir + '|||' + msg.script;
    var btn = document.querySelector('.btn-run[data-key="' + key.replace(/"/g,'&quot;') + '"]');
    if(btn){ setBtn(btn, msg.state); }
  }
});

// Tell the host we are ready
vsc.postMessage({ type:'ready' });
})();
</script>
</body>
</html>
